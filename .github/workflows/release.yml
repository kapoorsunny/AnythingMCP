name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: mcpw-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: mcpw-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: mcpw-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: mcpw-aarch64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: mcpw-x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz mcpw
          cd ../../../
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip mcpw.exe
          cd ../../../
          certutil -hashfile ${{ matrix.name }}.zip SHA256 > ${{ matrix.name }}.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and get SHA256
        id: sha
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE_URL="https://github.com/kapoorsunny/AnythingMCP/releases/download/v${VERSION}"

          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            curl -sL "${BASE_URL}/mcpw-${target}.tar.gz" -o "mcpw-${target}.tar.gz"
            sha=$(sha256sum "mcpw-${target}.tar.gz" | awk '{print $1}')
            key=$(echo "$target" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: kapoorsunny/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > homebrew-tap/Formula/mcpw.rb << 'FORMULA'
          class Mcpw < Formula
            desc "Turn any CLI tool or web API into an MCP server without writing code"
            homepage "https://github.com/kapoorsunny/AnythingMCP"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/kapoorsunny/AnythingMCP/releases/download/vVERSION_PLACEHOLDER/mcpw-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_APPLE_DARWIN"
              end

              on_intel do
                url "https://github.com/kapoorsunny/AnythingMCP/releases/download/vVERSION_PLACEHOLDER/mcpw-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_APPLE_DARWIN"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/kapoorsunny/AnythingMCP/releases/download/vVERSION_PLACEHOLDER/mcpw-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_UNKNOWN_LINUX_GNU"
              end

              on_intel do
                url "https://github.com/kapoorsunny/AnythingMCP/releases/download/vVERSION_PLACEHOLDER/mcpw-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_UNKNOWN_LINUX_GNU"
              end
            end

            def install
              bin.install "mcpw"
            end

            test do
              assert_match "mcpw", shell_output("#{bin}/mcpw --version")
            end
          end
          FORMULA

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-tap/Formula/mcpw.rb
          sed -i "s/SHA_AARCH64_APPLE_DARWIN/${{ steps.sha.outputs.aarch64_apple_darwin }}/g" homebrew-tap/Formula/mcpw.rb
          sed -i "s/SHA_X86_64_APPLE_DARWIN/${{ steps.sha.outputs.x86_64_apple_darwin }}/g" homebrew-tap/Formula/mcpw.rb
          sed -i "s/SHA_AARCH64_UNKNOWN_LINUX_GNU/${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}/g" homebrew-tap/Formula/mcpw.rb
          sed -i "s/SHA_X86_64_UNKNOWN_LINUX_GNU/${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}/g" homebrew-tap/Formula/mcpw.rb

          # Fix indentation (heredoc adds extra spaces)
          sed -i 's/^          //' homebrew-tap/Formula/mcpw.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "Abhishek Kapoor"
          git config user.email "kapoor@capecode.in"
          git add Formula/mcpw.rb
          git commit -m "Update mcpw to ${{ steps.version.outputs.version }}"
          git push
